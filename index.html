<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Urbanovichi - Assistente Virtual</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQEAYAAABPYyMiAAAABmJLR0T///////8JWPfcAAAACXBIWXMAAABIAAAASABGyWs+AAAAF0lEQVRIx2NgGAWjYBSMglEwCkbBSAcACBAAAeg95Q4AAAAASUVORK5CYII=">
</head>
<body class="bg-light">

    <div class="container py-4" style="max-width: 800px;">
        <div class="card shadow-sm border-0" style="height: 85vh;">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center p-3 rounded-top">
                <div class="d-flex align-items-center gap-2">
                    <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        🏥
                    </div>
                    <div>
                        <h5 class="mb-0" id="clinic-title">Clínica Urbanovichi</h5>
                        <small class="text-muted" style="color: #a0aec0 !important;">Urbanovichi Assistente</small>
                    </div>
                </div>
                <button class="btn btn-link text-white p-0" id="settings-btn" data-bs-toggle="modal" data-bs-target="#settingsModal">
                    <i class="bi bi-gear-fill" style="font-size: 1.25rem;"></i>
                </button>
            </div>

            <div class="card-body overflow-y-auto p-4" id="chat-container" style="background-color: #f8fafc;">
                </div>

            <div class="card-footer bg-transparent border-0 p-3">
                <form id="chat-form" class="d-flex gap-2 align-items-center">
                    <button type="button" class="btn btn-link text-muted p-0 me-2" id="mic-btn" style="font-size: 1.25rem;">
                        <i class="bi bi-mic"></i>
                    </button>
                    <input 
                        type="text" 
                        id="message-input" 
                        class="form-control rounded-pill bg-light border-0 px-4 py-2" 
                        placeholder="Digite sua dúvida ou instrução aqui..."
                        autocomplete="off"
                    >
                    <button type="submit" class="btn btn-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="bi bi-send-fill"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js?v=3"></script>
    <script src="js/ui.js"></script>
    <script src="js/chat.js?v=3"></script>
    <script src="js/app.js?v=3"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
